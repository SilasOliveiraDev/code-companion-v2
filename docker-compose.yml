version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRONTEND_URL=http://localhost:5173
      - WORKSPACE_ROOT=/workspace
    volumes:
      - workspace_data:/workspace
      - ./backend/src:/app/src
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_WORKSPACE_ROOT=/workspace
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  workspace_data:
    driver: local
